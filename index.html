<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Math Quest — Le parcours de maths de Louise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF1FB; --bg-card:#FFFFFF; --ink:#1B1F3B; --ink-soft:#565b82;
  --amber:#FFB945; --amber-ink:#7a5200; --coral:#FF6F61; --teal:#2EC4B6; --violet:#7C6FE0;
  --line:#D8DDF4; --shadow: 0 6px 0 rgba(27,31,59,0.08); --radius: 18px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: radial-gradient(circle at 8% 12%, rgba(124,111,224,0.10), transparent 40%),
    radial-gradient(circle at 92% 85%, rgba(255,185,69,0.14), transparent 45%), var(--bg);
  color:var(--ink); font-family:"Nunito Sans", sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:"Fredoka", sans-serif; font-weight:600; letter-spacing:0.2px;}
.mono{font-family:"JetBrains Mono", monospace;}
button{font-family:inherit; cursor:pointer;}
::selection{background:var(--amber); color:var(--ink);}
a{color:var(--violet);}
.topbar{position:sticky; top:0; z-index:40; display:flex; align-items:center; justify-content:space-between;
  padding:12px 22px; background:rgba(238,241,251,0.9); backdrop-filter:blur(6px); border-bottom:2px solid var(--line);}
.brand{display:flex; align-items:center; gap:10px;}
.brand .disc{width:30px; height:30px; border-radius:50%;
  background:conic-gradient(from 90deg, var(--amber), var(--coral), var(--violet), var(--teal), var(--amber));
  box-shadow:0 0 0 3px #fff, 0 0 0 5px var(--line); animation:spin 6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.brand .title{font-size:1.15rem;}
.brand .title small{display:block; font-size:0.62rem; color:var(--ink-soft); font-weight:700; letter-spacing:0.08em; text-transform:uppercase; font-family:"Nunito Sans";}
.stats{display:flex; align-items:center; gap:14px;}
.pill{display:flex; align-items:center; gap:6px; background:#fff; border:2px solid var(--line); border-radius:999px; padding:6px 12px; font-weight:700; font-size:0.85rem;}
.pill.xp{color:var(--amber-ink); border-color:#f4d8a0; background:#FFF7E8;}
.pill.streak{color:#b23c2e; border-color:#ffd2cb; background:#FFF1EF;}
.pill.badges{color:#3d3487; border-color:#dcd7fb; background:#F2F0FE;}
.wrap{max-width:1000px; margin:0 auto; padding:24px 18px 90px;}
.hero{background:var(--bg-card); border-radius:24px; border:2px solid var(--line); padding:26px 28px; margin-bottom:26px; box-shadow:var(--shadow);
  display:flex; gap:22px; align-items:center; flex-wrap:wrap;}
.hero .discoball{width:74px; height:74px; border-radius:50%; flex-shrink:0;
  background: repeating-conic-gradient(from 0deg, rgba(255,255,255,0.9) 0 6deg, rgba(124,111,224,0.35) 6deg 12deg);
  box-shadow: inset 0 -8px 16px rgba(27,31,59,0.15), 0 8px 0 rgba(27,31,59,0.06);}
.hero h1{margin:0 0 6px; font-size:1.5rem;}
.hero p{margin:0; color:var(--ink-soft); font-size:0.95rem; line-height:1.5;}
.trail{position:relative; padding:10px 0 6px;}
.trail::before{content:""; position:absolute; left:50%; top:0; bottom:0; width:4px; transform:translateX(-50%);
  background:repeating-linear-gradient(180deg, var(--line) 0 10px, transparent 10px 20px); z-index:0;}
.node-row{display:flex; justify-content:center; margin:14px 0; position:relative; z-index:1;}
.node-row.left{justify-content:flex-start;} .node-row.right{justify-content:flex-end;}
.node{width:min(320px, 82vw); text-align:left; background:#fff; border:2px solid var(--line); border-radius:var(--radius); padding:14px 16px;
  box-shadow:var(--shadow); display:flex; gap:12px; align-items:center; transition:transform .12s ease;}
.node:hover{transform:translateY(-2px);}
.node.locked{opacity:0.5; filter:grayscale(0.4);}
.node .emoji{font-size:1.7rem; width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; background:var(--bg); flex-shrink:0;}
.node .info{flex:1; min-width:0;}
.node .info .name{font-weight:800; font-size:0.95rem; font-family:"Fredoka";}
.node .info .sub{font-size:0.66rem; color:var(--ink-soft); font-weight:700; text-transform:uppercase; letter-spacing:0.04em;}
.node .info .bar{height:7px; border-radius:6px; background:var(--line); margin-top:7px; overflow:hidden;}
.node .info .bar > span{display:block; height:100%; background:linear-gradient(90deg, var(--teal), var(--violet));}
.node .info .status{font-size:0.72rem; color:var(--ink-soft); margin-top:4px; font-weight:700;}
.grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:14px;}
.card{background:#fff; border:2px solid var(--line); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow);}
.card h3{margin:0 0 6px; font-size:1rem;}
.card p{margin:0 0 10px; color:var(--ink-soft); font-size:0.85rem; line-height:1.45;}
.tag{display:inline-block; font-size:0.68rem; font-weight:800; text-transform:uppercase; letter-spacing:0.05em; padding:3px 8px; border-radius:999px; background:var(--bg); color:var(--violet); margin-bottom:8px;}
.btn{display:inline-flex; align-items:center; gap:6px; justify-content:center; background:var(--ink); color:#fff; border:none; border-radius:12px; padding:10px 16px;
  font-weight:700; font-size:0.88rem; box-shadow:0 4px 0 rgba(0,0,0,0.18);}
.btn:active{transform:translateY(2px); box-shadow:none;}
.btn.amber{background:var(--amber); color:var(--amber-ink); box-shadow:0 4px 0 #d99b1f;}
.btn.teal{background:var(--teal); color:#04332f; box-shadow:0 4px 0 #1f948a;}
.btn.coral{background:var(--coral); color:#4a120c; box-shadow:0 4px 0 #d5493c;}
.btn.ghost{background:#fff; color:var(--ink); border:2px solid var(--line); box-shadow:none;}
.btn:disabled{opacity:0.4; cursor:not-allowed;}
.btn.small{padding:7px 12px; font-size:0.78rem;}
.overlay{position:fixed; inset:0; background:rgba(27,31,59,0.45); display:flex; align-items:flex-end; justify-content:center; z-index:100;}
@media(min-width:720px){.overlay{align-items:center;}}
.modal{background:#fff; width:100%; max-width:640px; max-height:92vh; overflow-y:auto; border-radius:22px 22px 0 0; padding:24px; position:relative;}
@media(min-width:720px){.modal{border-radius:22px;}}
.modal .close{position:absolute; top:14px; right:16px; background:var(--bg); border:none; width:32px; height:32px; border-radius:50%; font-size:1rem; font-weight:800;}
.levelrow{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;}
.levelbtn{flex:1 1 130px; border:2px solid var(--line); border-radius:14px; padding:12px; background:#fff; text-align:left;}
.levelbtn .num{font-family:"Fredoka"; font-weight:700; font-size:1.1rem;}
.levelbtn .lab{font-size:0.74rem; color:var(--ink-soft); font-weight:700;}
.levelbtn.done{border-color:var(--teal); background:#EAFBF9;}
.levelbtn.locked{opacity:0.45;}
.session{background:#fff; border:2px solid var(--line); border-radius:22px; padding:26px; box-shadow:var(--shadow);}
.progresstop{display:flex; align-items:center; gap:10px; margin-bottom:18px;}
.progresstop .track{flex:1; height:9px; background:var(--bg); border-radius:6px; overflow:hidden;}
.progresstop .track > span{display:block; height:100%; background:linear-gradient(90deg,var(--amber),var(--coral));}
.progresstop .count{font-size:0.8rem; font-weight:800; color:var(--ink-soft); white-space:nowrap;}
.q-prompt{font-size:1.05rem; font-weight:700; margin-bottom:16px; line-height:1.5;}
.choices{display:grid; gap:10px;}
.choice{border:2px solid var(--line); border-radius:14px; padding:13px 16px; background:#fff; font-weight:700; text-align:left; font-size:0.95rem;}
.choice:hover{border-color:var(--violet);}
.choice.correct{border-color:var(--teal); background:#EAFBF9;}
.choice.wrong{border-color:var(--coral); background:#FFF1EF;}
.fillbox{width:100%; padding:13px 14px; border:2px solid var(--line); border-radius:14px; font-size:1rem; font-family:inherit; font-weight:700;}
.wordbank{display:flex; flex-wrap:wrap; gap:8px; margin:14px 0;}
.wtok{border:2px solid var(--line); background:#fff; border-radius:10px; padding:8px 12px; font-weight:700;}
.wtok.used{opacity:0.3; pointer-events:none;}
.answerstrip{min-height:52px; border:2px dashed var(--line); border-radius:14px; padding:10px; display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; align-items:center;}
.answerstrip .placeholder{color:var(--ink-soft); font-size:0.85rem;}
.atok{border:2px solid var(--violet); background:#F2F0FE; border-radius:10px; padding:8px 12px; font-weight:700;}
.rowbtns{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
.feedback{margin-top:16px; padding:16px; border-radius:16px; font-size:0.9rem; line-height:1.55;}
.feedback.ok{background:#EAFBF9; border:2px solid var(--teal);}
.feedback.ko{background:#FFF1EF; border:2px solid var(--coral);}
.feedback b{display:block; margin-bottom:4px;}
.hintbox{margin-top:10px; padding:10px 14px; background:#FFF7E8; border:2px solid #f4d8a0; border-radius:12px; font-size:0.85rem;}
.footer{text-align:center; padding:30px 10px 10px; color:var(--ink-soft); font-size:0.78rem;}
.footer button{background:none; border:none; color:var(--ink-soft); text-decoration:underline; font-size:0.78rem;}
.badgegrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:10px; margin-top:10px;}
.badge{text-align:center; padding:10px 4px; border-radius:14px; background:var(--bg); border:2px solid var(--line); font-size:1.5rem;}
.badge.locked{opacity:0.25; filter:grayscale(1);}
.badge span{display:block; font-size:0.62rem; font-weight:800; margin-top:4px; color:var(--ink-soft);}
table.datatable{width:100%; border-collapse:collapse; font-size:0.8rem;}
table.datatable th, table.datatable td{border-bottom:1px solid var(--line); padding:6px 8px; text-align:left;}
.toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:12px 20px; border-radius:999px; font-weight:700; font-size:0.88rem; z-index:200; box-shadow:0 8px 20px rgba(0,0,0,0.25);}
.nav-tabs{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;}
.nav-tabs button{border:2px solid var(--line); background:#fff; border-radius:999px; padding:8px 14px; font-weight:800; font-size:0.82rem; color:var(--ink-soft);}
.nav-tabs button.active{background:var(--ink); color:#fff; border-color:var(--ink);}
.empty{text-align:center; padding:30px; color:var(--ink-soft); font-size:0.9rem;}
label.small{font-size:0.78rem; font-weight:700; color:var(--ink-soft); display:block; margin:10px 0 4px;}
select, input[type=text]{font-family:inherit;}
.flaglink{background:none; border:none; color:var(--ink-soft); text-decoration:underline; font-size:0.78rem; margin-top:8px; padding:0;}
.statuspill{display:inline-block; font-size:0.66rem; font-weight:800; padding:2px 8px; border-radius:999px;}
.statuspill.decouverte{background:#eee; color:#666;}
.statuspill.fragile{background:#FFE3DE; color:#a63b2c;}
.statuspill.encours{background:#FFF3D6; color:#8a6100;}
.statuspill.presque{background:#E4E1FB; color:#4c3fb0;}
.statuspill.maitrise{background:#DDF7F2; color:#0d6e60;}
.statuspill.revoir{background:#FFE3DE; color:#a63b2c;}
</style>
</head>

  <div class="brand">

<script>
/* ============================================================
   DONNÉES — NOTIONS (programme officiel de mathématiques, 4e)
   Repère : pour l'année scolaire en cours, la 4e suit encore le
   programme cycle 4 du BO du 30/07/2020 (attendus de fin de 4e,
   BO n°22 du 29/05/2019). Le nouveau programme de mathématiques
   (BO du 5 mars 2026) n'entrera en application en 4e qu'à la
   rentrée 2027-2028 (5e dès 2026-2027, 3e en 2028-2029).
   Détail et sources dans LISEZ_MOI.txt.
   ============================================================ */
const NOTIONS = [
{
  id:"calcul_priorites", name:"Priorités opératoires", emoji:"🧮", domain:"Nombres et calculs", competences:["Calculer","Communiquer"], prereqs:[],
  objective:"Calculer une expression numérique en respectant l'ordre des opérations.",
  method:"1) Parenthèses d'abord. 2) Multiplications et divisions (de gauche à droite). 3) Additions et soustractions (de gauche à droite).",
  example:"5 + 3 × 4 : on calcule d'abord 3×4=12, puis 5+12=17.",
  erreurs:"Additionner avant de multiplier ; oublier une parenthèse.",
  verif:"Refaire le calcul étape par étape, ou estimer l'ordre de grandeur du résultat.",
  levels:{
    1:[
      {kind:"mcq", prompt:"Dans 5 + 3 × 4, quelle opération dois-tu calculer en premier ?", choices:["5+3","3×4","Peu importe l'ordre"], answer:1,
        correction:{rule:"Les multiplications et divisions sont prioritaires sur les additions et soustractions.", why:"Sans parenthèses, on ne fait jamais l'addition en premier si une multiplication est présente.", example:"Dans 2+3×5, on calcule 3×5 d'abord.", errorType:"erreur de priorité"}},
      {kind:"mcq", prompt:"Dans (4+2)×3, que dois-tu calculer en premier ?", choices:["4+2","2×3","4×3"], answer:0,
        correction:{rule:"Les parenthèses sont toujours calculées en premier.", why:"Le contenu des parenthèses doit être calculé avant tout le reste.", example:"(1+1)×5 = 2×5 = 10.", errorType:"oubli d'une parenthèse"}}
    ],
    2:[
      {kind:"fill", prompt:"Calcule : 5 + 3 × 4 = ___", accepted:["17"],
        correction:{rule:"Multiplication avant addition.", why:"On calcule 3×4=12 puis 5+12=17.", example:"2+4×2 = 2+8 = 10.", errorType:"erreur de priorité"}},
      {kind:"fill", prompt:"Calcule : (6 - 2) × 3 = ___", accepted:["12"],
        correction:{rule:"Parenthèses en premier.", why:"6-2=4, puis 4×3=12.", example:"(5-1)×2 = 4×2 = 8.", errorType:"oubli d'une parenthèse"}}
    ],
    3:[
      {kind:"order", words:["3×4","=12","5+12","=17"], prompt:"Remets dans l'ordre les étapes pour calculer 5 + 3 × 4."},
      {kind:"order", words:["7-3","=4","4×5","=20"], prompt:"Remets dans l'ordre les étapes pour calculer (7-3)×5."}
    ],
    4:[
      {kind:"open", prompt:"Calcule 8 + 2 × (5-3) et écris toutes tes étapes.", requiredAny:["12"], minLen:8,
        correction:{example:"5-3=2 ; 2×2=4 ; 8+4=12. Résultat : 12."}},
      {kind:"open", prompt:"Calcule 30 - 4 × (6-4) et écris toutes tes étapes.", requiredAny:["22"], minLen:8,
        correction:{example:"6-4=2 ; 4×2=8 ; 30-8=22. Résultat : 22."}}
    ]
  }
},
{
  id:"relatifs", name:"Nombres relatifs", emoji:"➖", domain:"Nombres et calculs", competences:["Calculer","Représenter"], prereqs:["calcul_priorites"],
  objective:"Comparer, additionner, soustraire et multiplier des nombres relatifs.",
  method:"Signes différents à l'addition : soustraire les distances à zéro et garder le signe du plus grand en valeur absolue. Multiplication : signes identiques → positif, signes différents → négatif.",
  example:"(-5)+3 : on soustrait 5-3=2, le plus grand en valeur absolue est -5 (négatif), donc résultat = -2.",
  erreurs:"Confondre « plus petit » et « plus grand en valeur absolue » ; oublier de changer le signe en multipliant par un négatif.",
  verif:"Vérifier avec une droite graduée ou une situation concrète (température, altitude).",
  levels:{
    1:[
      {kind:"mcq", prompt:"Quel nombre est le plus grand : -8 ou -3 ?", choices:["-8","-3","Ils sont égaux"], answer:1,
        correction:{rule:"Sur la droite graduée, plus on va vers la droite, plus le nombre est grand.", why:"-3 est plus proche de 0 (à droite) que -8, donc -3 > -8.", example:"-1 > -10.", errorType:"confusion ordre des relatifs"}},
      {kind:"mcq", prompt:"Quel est le signe de (-4)×(-7) ?", choices:["Positif","Négatif","Impossible à savoir"], answer:0,
        correction:{rule:"Le produit de deux nombres de même signe est positif.", why:"Deux négatifs multipliés entre eux donnent un résultat positif.", example:"(-2)×(-3)=6.", errorType:"erreur de signe"}}
    ],
    2:[
      {kind:"fill", prompt:"Calcule : (-5) + 3 = ___", accepted:["-2"],
        correction:{rule:"Signes différents : soustraire les distances à zéro, garder le signe du plus grand en valeur absolue.", why:"5-3=2, et -5 a la plus grande valeur absolue, donc le résultat est -2.", example:"(-8)+3 = -5.", errorType:"erreur de signe"}},
      {kind:"fill", prompt:"Calcule : (-6) × (-2) = ___", accepted:["12"],
        correction:{rule:"Même signe → produit positif.", why:"(-6) et (-2) sont tous les deux négatifs.", example:"(-3)×(-4)=12.", errorType:"erreur de signe"}}
    ],
    3:[
      {kind:"order", words:["Calculer 5-3=2","Garder le signe de -5","Résultat : -2"], prompt:"Remets dans l'ordre le raisonnement pour calculer (-5)+3."},
      {kind:"order", words:["Repérer deux signes identiques","Produit positif","Calculer 3×5=15","Résultat : 15"], prompt:"Remets dans l'ordre le raisonnement pour calculer (-3)×(-5)."}
    ],
    4:[
      {kind:"open", prompt:"Un plongeur est à -12m. Il remonte de 5m. À quelle profondeur est-il ? Écris ton calcul.", requiredAny:["-7"], minLen:6,
        correction:{example:"-12+5=-7. Il est à -7m (7m sous la surface)."}},
      {kind:"open", prompt:"Calcule (-9)×3 et explique la règle de signe utilisée.", requiredAny:["-27"], minLen:8,
        correction:{example:"-9×3=-27. Signes différents (négatif × positif) → résultat négatif."}}
    ]
  }
},
{
  id:"fractions", name:"Fractions", emoji:"🍕", domain:"Nombres et calculs", competences:["Calculer","Raisonner"], prereqs:["relatifs"],
  objective:"Simplifier, comparer et effectuer des opérations sur des fractions.",
  method:"Pour additionner/soustraire : réduire au même dénominateur. Pour simplifier : diviser numérateur et dénominateur par un diviseur commun.",
  example:"1/4 + 1/2 : on réécrit 1/2 = 2/4, donc 1/4+2/4=3/4.",
  erreurs:"Additionner numérateurs et dénominateurs directement (1/4+1/2 ≠ 2/6) ; oublier de simplifier le résultat.",
  verif:"Vérifier que le résultat est irréductible et cohérent (entre les deux fractions de départ pour une addition de positifs).",
  levels:{
    1:[
      {kind:"mcq", prompt:"Quelle fraction est égale à 2/4 ?", choices:["1/2","1/4","3/4"], answer:0,
        correction:{rule:"On simplifie en divisant numérateur et dénominateur par leur diviseur commun.", why:"2/4 = (2÷2)/(4÷2) = 1/2.", example:"6/8 = 3/4.", errorType:"fraction non simplifiée"}},
      {kind:"mcq", prompt:"Pour additionner 1/3 et 1/6, quel dénominateur commun choisir ?", choices:["3","6","9"], answer:1,
        correction:{rule:"Le dénominateur commun est un multiple commun des deux dénominateurs.", why:"6 est un multiple de 3 et de lui-même : c'est le plus petit choix pratique.", example:"Pour 1/4 et 1/2, le dénominateur commun est 4.", errorType:"mauvais dénominateur commun"}}
    ],
    2:[
      {kind:"fill", prompt:"Simplifie la fraction 8/12 (sous la forme a/b).", accepted:["2/3"],
        correction:{rule:"Diviser par le PGCD (ici 4).", why:"8÷4=2 et 12÷4=3.", example:"9/12 = 3/4.", errorType:"fraction non simplifiée"}},
      {kind:"fill", prompt:"Calcule : 1/4 + 1/2 = ___ (sous la forme a/b)", accepted:["3/4"],
        correction:{rule:"Mettre au même dénominateur avant d'additionner.", why:"1/2=2/4, donc 1/4+2/4=3/4.", example:"1/3+1/3=2/3.", errorType:"mauvais dénominateur commun"}}
    ],
    3:[
      {kind:"order", words:["Réécrire 1/2 en 2/4","Additionner les numérateurs : 1+2=3","Résultat : 3/4"], prompt:"Remets dans l'ordre les étapes de 1/4 + 1/2."},
      {kind:"order", words:["Chercher le PGCD de 8 et 12 (=4)","Diviser 8 par 4","Diviser 12 par 4","Résultat : 2/3"], prompt:"Remets dans l'ordre les étapes pour simplifier 8/12."}
    ],
    4:[
      {kind:"open", prompt:"Une pizza est coupée en 8 parts. Tu manges 3 parts. Quelle fraction as-tu mangée, simplifiée si possible ? Explique.", requiredAny:["3/8"], minLen:6,
        correction:{example:"3/8 (déjà irréductible, 3 et 8 n'ont pas de diviseur commun autre que 1)."}},
      {kind:"open", prompt:"Calcule 2/3 - 1/6 et explique tes étapes.", requiredAny:["1/2"], minLen:8,
        correction:{example:"2/3=4/6, donc 4/6-1/6=3/6=1/2."}}
    ]
  }
},
{
  id:"proportionnalite", name:"Proportionnalité", emoji:"⚖️", domain:"Grandeurs et nombres", competences:["Modéliser","Calculer"], prereqs:["fractions"],
  objective:"Reconnaître une situation de proportionnalité et calculer une quatrième proportionnelle.",
  method:"Vérifier que les rapports sont égaux, puis utiliser le coefficient, le passage à l'unité, ou le produit en croix.",

  }},
  {id:"fractions_us", label:"Fractions usuelles", generate:()=>{
    const bases=[8,12,16,20,24,40,60,100];
    const base = bases[Math.floor(Math.random()*bases.length)];
    const opts=[["1/2",2],["1/4",4],["3/4", 4/3]];
    const pick = opts[Math.floor(Math.random()*opts.length)];
    let val;
    if(pick[0]==="3/4") val = base*3/4; else val = base/pick[1];
    return {q:"Calcule "+pick[0]+" de "+base, a:String(val)};
  }},
  {id:"pourc_us", label:"Pourcentages usuels", generate:()=>{
    const bases=[20,40,50,80,100,120,200,240];
    const base = bases[Math.floor(Math.random()*bases.length)];
    const taux=[10,20,25,50][Math.floor(Math.random()*4)];
    return {q:"Calcule "+taux+"% de "+base, a:String(base*taux/100)};
  }},
  {id:"carres", label:"Carrés usuels", generate:()=>{
    const n=1+Math.floor(Math.random()*15);
    return {q:"Calcule "+n+"²", a:String(n*n)};
  }},
  {id:"signes", label:"Signes des produits", generate:()=>{
    const s1 = Math.random()<0.5?-1:1, s2 = Math.random()<0.5?-1:1;
    const n1 = s1*(1+Math.floor(Math.random()*9)), n2 = s2*(1+Math.floor(Math.random()*9));
    return {q:"Le produit ("+n1+") × ("+n2+") est-il positif ou négatif ?", a: (n1*n2>0)?"positif":"négatif", choices:["positif","négatif"]};
  }}
];

const STORE_KEY = "louise_math_quest_v1";
function defaultState(){
  return {
    xp:0, badges:[], streak:{count:0, last:null}, notionProgress:{}, errorLog:[],
    flaggedQuestions:[], automatismesStats:{}, parentUnlockAll:false, hideParentGear:false, createdAt:Date.now()
  };
}
let state = load();
function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  }catch(e){ return defaultState(); }
}
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){} }
function bumpStreak(){
  const today = new Date().toDateString();
  if(state.streak.last === today) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  if(state.streak.last === y.toDateString()){ state.streak.count += 1; } else { state.streak.count = 1; }
  state.streak.last = today;
}
function getProgress(notionId){
  if(!state.notionProgress[notionId]){
    state.notionProgress[notionId] = {1:{attempts:0,correct:0,validated:false},2:{attempts:0,correct:0,validated:false},3:{attempts:0,correct:0,validated:false},4:{attempts:0,correct:0,validated:false}};
  }
  return state.notionProgress[notionId];
}
function notionUnlocked(n){
  if(state.parentUnlockAll) return true;
  if(!n.prereqs.length) return true;
  return n.prereqs.every(pid => getProgress(pid)[1].validated);
}
function levelUnlocked(n, lvl){
  if(state.parentUnlockAll) return true;
  if(lvl===1) return notionUnlocked(n);
  const p = getProgress(n.id);
  return p[lvl-1] && p[lvl-1].validated;
}
function notionOverallPct(n){
  const p = getProgress(n.id);
  return Math.round([1,2,3,4].filter(l=>p[l].validated).length/4*100);
}
function notionStatus(n){
  const p = getProgress(n.id);
  const validatedCount = [1,2,3,4].filter(l=>p[l].validated).length;
  const attempts = [1,2,3,4].reduce((s,l)=>s+p[l].attempts,0);
  if(validatedCount===4){
    const recentErr = state.errorLog.slice(-25).some(e=>e.notion===n.id);
    return recentErr? {label:"À revoir", cls:"revoir"} : {label:"Maîtrisé", cls:"maitrise"};
  }
  if(validatedCount>=3) return {label:"Presque maîtrisé", cls:"presque"};
  if(validatedCount>=1) return {label:"En cours", cls:"encours"};
  if(attempts>0) return {label:"Fragile", cls:"fragile"};
  return {label:"Découverte", cls:"decouverte"};
}

  {id:"xp100", name:"100 XP", emoji:"⭐", check:s=> s.xp>=100},
  {id:"xp500", name:"500 XP", emoji:"🌟", check:s=> s.xp>=500},
  {id:"xp1000", name:"1000 XP", emoji:"💫", check:s=> s.xp>=1000},
  {id:"streak3", name:"3 jours de suite", emoji:"🔥", check:s=> s.streak.count>=3},
  {id:"first_master", name:"Notion maîtrisée", emoji:"🏆", check:s=> Object.values(s.notionProgress).some(p=>[1,2,3,4].every(l=>p[l] && p[l].validated))},
  {id:"explorer", name:"Exploratrice", emoji:"🧭", check:s=> Object.keys(s.notionProgress).length >= NOTIONS.length},
  {id:"bughunter", name:"Chasseuse d'erreurs", emoji:"🔍", check:s=> s._reviewDone>=1},

];
function checkBadges(){
  state._exCount = (state._exCount||0);
  const newly = [];
  BADGE_DEFS.forEach(b=>{
    if(!state.badges.includes(b.id) && b.check(state)){ state.badges.push(b.id); newly.push(b); }
  });
  return newly;
}
function awardXP(kind, correct, level){
  let base = kind==="mcq"?10:kind==="fill"?15:kind==="order"?20:kind==="open"?18:8;
  if(!correct) base = 3;
  const mult = 1 + (level-1)*0.25;
  const gained = Math.round(base*mult);
  state.xp += gained;
  state._exCount = (state._exCount||0)+1;
  return gained;
}

let EXERCISE_INDEX = {};
function buildExerciseIndex(){
  NOTIONS.forEach(n=>{
    [1,2,3,4].forEach(lvl=>{
      n.levels[lvl].forEach((ex,i)=>{
        const id = n.id+"_"+lvl+"_"+i;
        ex._id = id; ex._notion = n.id; ex._level = lvl;
        EXERCISE_INDEX[id] = ex;
      });
    });
  });
}
buildExerciseIndex();
function logError(ex){
  state.errorLog.push({exId:ex._id, notion:ex._notion, level:ex._level, errorType:(ex.correction&&ex.correction.errorType)||"non catégorisée", ts:Date.now()});
  if(state.errorLog.length>300) state.errorLog = state.errorLog.slice(-300);
}
function reviewPool(){
  const seen = {}; const list = [];
  for(let i=state.errorLog.length-1;i>=0 && list.length<8;i--){
    const e = state.errorLog[i];
    if(seen[e.exId]) continue;
    seen[e.exId]=true;
    const ex = EXERCISE_INDEX[e.exId];
    if(ex) list.push(ex);
  }
  return list;
}

/* ---------- session engine ---------- */
function startSession(exercises, meta){
  const sessionExercises = shuffle(exercises.slice());
  let idx = 0; let sessionCorrect = 0;
  renderSessionUI();

  function renderSessionUI(){
    const c = document.getElementById("tabContent");
    const ex = sessionExercises[idx];
    const pctDone = Math.round(idx/sessionExercises.length*100);
    c.innerHTML = "<div class='session'>"+
      "<div class='progresstop'>"+
        "<div class='track'><span style='width:"+pctDone+"%'></span></div>"+
        "<div class='count mono'>"+(idx+1)+"/"+sessionExercises.length+"</div>"+
      "</div>"+
      "<div class='q-prompt'>"+ex.prompt+"</div>"+
      "<div id='exBody'></div>"+
      "<div id='exFeedback'></div>"+
      "<div class='rowbtns' style='margin-top:18px;'>"+
        "<button class='btn ghost small' id='quitSession'>Quitter</button>"+
      "</div>"+
    "</div>";
    document.getElementById("quitSession").addEventListener("click", ()=>{ renderTab(); });
    renderExerciseBody(ex);
  }

  function renderExerciseBody(ex){
    const body = document.getElementById("exBody");
    if(ex.kind==="mcq"){
      body.innerHTML = "<div class='choices'>"+ex.choices.map((c,i)=>"<button class='choice' data-i='"+i+"'>"+c+"</button>").join("")+"</div>";
      body.querySelectorAll(".choice").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const i = parseInt(btn.dataset.i);
          const correct = i===ex.answer;
          body.querySelectorAll(".choice").forEach(b=>b.disabled=true);
          btn.classList.add(correct?"correct":"wrong");
          if(!correct) body.querySelector("[data-i='"+ex.answer+"']").classList.add("correct");
          finish(correct, ex);
        });
      });
    } else if(ex.kind==="fill"){
      body.innerHTML = "<input type='text' class='fillbox' id='fillInput' placeholder='Écris ta réponse...'>"+
        "<div class='rowbtns'><button class='btn amber' id='fillCheck'>Valider</button></div>";
      document.getElementById("fillCheck").addEventListener("click", ()=>{
        const raw = document.getElementById("fillInput").value.trim().toLowerCase();
        const val = raw.replace(/\s/g,"").replace(/\./g,",");
        const correct = ex.accepted.some(a=> a.toLowerCase().replace(/\s/g,"") === val );
        document.getElementById("fillCheck").disabled = true;
        document.getElementById("fillInput").disabled = true;
        finish(correct, ex);
      });
    } else if(ex.kind==="order"){
      renderOrder(ex, body, 0);
    } else if(ex.kind==="open"){
      body.innerHTML = "<textarea class='fillbox' id='openInput' rows='3' placeholder='Écris ta réponse et tes étapes...'></textarea>"+
        "<div class='rowbtns'><button class='btn amber' id='openCheck'>Valider</button></div>";
      document.getElementById("openCheck").addEventListener("click", ()=>{
        const val = document.getElementById("openInput").value.trim();
        const low = val.toLowerCase();
        const hasKeyword = !ex.requiredAny || ex.requiredAny.length===0 || ex.requiredAny.some(k=>low.includes(k.toLowerCase()));
        const longEnough = val.length >= (ex.minLen||5);
        const correct = hasKeyword && longEnough;
        document.getElementById("openCheck").disabled = true;
        document.getElementById("openInput").disabled = true;
        finish(correct, ex, !hasKeyword ? "Vérifie ton résultat final (regarde bien le calcul)." : (!longEnough? "Essaie d'écrire un peu plus tes étapes de calcul." : ""));
      });
    }
  }

  function renderOrder(ex, body, attempt){
    let bank = shuffle(ex.words.map((w,i)=>({w:w,i:i})));
    let answer = [];
    function draw(){
      body.innerHTML = "<div class='answerstrip' id='answerStrip'><span class='placeholder'>Clique sur les étapes ci-dessous dans le bon ordre...</span></div>"+
        "<div class='wordbank' id='wordBank'></div>"+
        "<div class='rowbtns'>"+
          "<button class='btn ghost small' id='undoBtn'>↩ Annuler</button>"+
          "<button class='btn ghost small' id='resetBtn'>🔄 Recommencer</button>"+
          "<button class='btn ghost small' id='hintBtn'>💡 Indice</button>"+
          "<button class='btn amber small' id='validateBtn'>Valider</button>"+
        "</div>"+
        "<div id='hintZone'></div>";
      renderBank(); renderStrip();
      document.getElementById("undoBtn").addEventListener("click", ()=>{ if(answer.length){ answer.pop(); renderBank(); renderStrip(); }});
      document.getElementById("resetBtn").addEventListener("click", ()=>{ answer=[]; renderBank(); renderStrip(); });
      document.getElementById("hintBtn").addEventListener("click", ()=> showHint());
      document.getElementById("validateBtn").addEventListener("click", ()=> checkOrder());
    }
    function renderBank(){
      const wb = document.getElementById("wordBank");
      wb.innerHTML = bank.map(t=>"<button class='wtok "+(answer.includes(t)?'used':'')+"' data-idx='"+t.i+"'>"+t.w+"</button>").join("");
      wb.querySelectorAll(".wtok:not(.used)").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const idx = parseInt(btn.dataset.idx);
          const tok = bank.find(t=>t.i===idx);
          answer.push(tok); renderBank(); renderStrip();
        });
      });
    }
    function renderStrip(){
      const strip = document.getElementById("answerStrip");
      strip.innerHTML = answer.length? answer.map(t=>"<span class='atok'>"+t.w+"</span>").join("") : "<span class='placeholder'>Clique sur les étapes ci-dessous dans le bon ordre...</span>";
    }
    function showHint(){
      const zone = document.getElementById("hintZone");
      let hintTxt = "Repense à l'ordre logique du calcul (que fait-on en premier ?).";
      for(let k=0;k<ex.words.length;k++){
        if(!answer[k] || answer[k].w!==ex.words[k]){
          hintTxt = "Vérifie l'étape numéro "+(k+1)+" : est-ce vraiment ce qu'on fait à ce moment du calcul ?";
          break;
        }
      }
      zone.innerHTML = "<div class='hintbox'>💡 "+hintTxt+"</div>";
    }
    function checkOrder(){
      const userSeq = answer.map(t=>t.w);
      const correct = JSON.stringify(userSeq)===JSON.stringify(ex.words);
      if(!correct && attempt===0){
        showHint(); toast("Pas tout à fait ! Regarde l'indice et réessaie 💡"); attempt = 1; return;
      }
      finish(correct, ex);
    }
    draw();
  }

  function finish(correct, ex, extraHint){
    if(correct) sessionCorrect++; else logError(ex);
    const gained = awardXP(ex.kind, correct, ex._level||1);
    const zone = document.getElementById("exFeedback");
    const corr = ex.correction || {};
    let html = "<div class='feedback "+(correct?'ok':'ko')+"'>";
    html += "<b>"+(correct? "✅ Bravo ! +"+gained+" XP" : "➡️ Pas encore, +"+gained+" XP pour l'effort")+"</b>";
    if(corr.rule) html += "<div><b style='display:inline;'>Méthode :</b> "+corr.rule+"</div>";
    if(!correct && corr.why) html += "<div style='margin-top:6px;'><b style='display:inline;'>Pourquoi :</b> "+corr.why+"</div>";
    if(corr.example) html += "<div style='margin-top:6px;'><b style='display:inline;'>Exemple :</b> "+corr.example+"</div>";
    if(extraHint) html += "<div style='margin-top:6px;'>"+extraHint+"</div>";
    html += "<div class='rowbtns' style='margin-top:14px;'><button class='btn teal' id='nextBtn'>"+(idx+1<sessionExercises.length? "Suivant →":"Terminer")+"</button></div>";
    html += "<button class='flaglink' id='flagBtn'>🚩 Signaler cette question</button>";
    html += "</div>";
    zone.innerHTML = html;
    document.getElementById("nextBtn").addEventListener("click", ()=>{
      idx++;
      if(idx>=sessionExercises.length){ endSession(); } else { renderSessionUI(); }
    });
    document.getElementById("flagBtn").addEventListener("click", ()=> openFlagPanel(ex));
    save(); refreshHeader();
  }

  function endSession(){
    const total = sessionExercises.length;
    const pct = Math.round(sessionCorrect/total*100);
    if(meta.type==="notion"){
      const p = getProgress(meta.notionId);
      p[meta.level].attempts += total;
      p[meta.level].correct += sessionCorrect;
      if(pct>=70) p[meta.level].validated = true;
    } else if(meta.type==="review"){
      state._reviewDone = (state._reviewDone||0)+1;
    } else if(meta.type==="victoire"){
      state._victoires = (state._victoires||0)+1;
    }
    bumpStreak();
    const newBadges = checkBadges();
    save();
    const c = document.getElementById("tabContent");
    let msg = "";
    if(meta.type==="notion" && pct<70) msg = "<p style='color:var(--ink-soft);'>Ce niveau n'est pas encore validé (il faut 70%). Retente quand tu veux, sans pression 💛</p>";
    if(meta.type==="notion" && pct>=70) msg = "<p style='color:var(--teal); font-weight:800;'>Niveau validé ✓ — le niveau suivant est débloqué !</p>";
    c.innerHTML = "<div class='session' style='text-align:center;'>"+
      "<h2>"+(meta.type==="victoire" ? "🌤️ Petite victoire !" : (pct>=70? "🎉 Bien joué !" : "💪 Bon effort !"))+"</h2>"+
      "<p style='color:var(--ink-soft);'>Tu as eu "+sessionCorrect+"/"+total+" bonnes réponses ("+pct+"%).</p>"+
      msg+
      (newBadges.length? "<div class='badgegrid'>"+newBadges.map(b=>"<div class='badge'>"+b.emoji+"<span>"+b.name+"</span></div>").join("")+"</div>" : "")+
      "<div class='rowbtns' style='justify-content:center; margin-top:18px;'>"+
        "<button class='btn amber' id='backHome'>Retour au parcours</button>"+
      "</div>"+
    "</div>";
    document.getElementById("backHome").addEventListener("click", ()=>{ currentTab = meta.type==="review"?"erreurs":"parcours"; renderApp(); });
    refreshHeader();
  }
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp; }
  return arr;
}

function startVictoire(){
  let pool = [];
  NOTIONS.forEach(n=>{
    if(!notionUnlocked(n)) return;
    pool = pool.concat(n.levels[1]);
  });
  pool = shuffle(pool).slice(0,3);
  if(!pool.length){ toast("Commence d'abord une notion pour débloquer ce mode."); return; }
  startSession(pool, {type:"victoire"});
}

/* ---------- signaler une question ---------- */
function openFlagPanel(ex){
  const reasons = ["Ambiguë","Incorrecte","Trop facile","Trop difficile","Données incohérentes","Correction insuffisante","Problème technique"];
  overlayRoot.innerHTML = "<div class='overlay'><div class='modal'>"+
    "<button class='close' id='closeFlag'>✕</button>"+
    "<h2>🚩 Signaler cette question</h2>"+
    "<p style='color:var(--ink-soft); font-size:0.87rem;'><b>Question :</b> "+ex.prompt+"</p>"+
    "<label class='small'>Motif</label>"+
    "<select id='flagReason' style='width:100%; padding:10px; border:2px solid var(--line); border-radius:10px;'>"+
      reasons.map(r=>"<option value='"+r+"'>"+r+"</option>").join("")+
    "</select>"+
    "<label class='small'>Commentaire (optionnel)</label>"+
    "<textarea class='fillbox' id='flagComment' rows='2' placeholder='Précise si besoin...'></textarea>"+
    "<div class='rowbtns' style='margin-top:12px;'>"+
      "<button class='btn coral small' id='sendFlag'>Envoyer le signalement</button>"+
    "</div>"+
  "</div></div>";
  document.getElementById("closeFlag").addEventListener("click", closeOverlay);

      comment:document.getElementById("flagComment").value.trim(), ts:Date.now()
    });

/* ---------- automatismes tab ---------- */
function renderAutomatismesTab(c){
  c.innerHTML = "<div class='grid'>" + AUTOMATISMES.map(a=>{
    const st = state.automatismesStats[a.id];
    return "<div class='card'>"+
      "<div class='tag'>Calcul mental</div>"+
      "<h3>"+a.label+"</h3>"+
      "<p>"+(st? ("Meilleur score : "+st.best+"/8") : "Pas encore essayé")+"</p>"+
      "<button class='btn amber small' data-auto='"+a.id+"'>Faire 8 questions</button>"+
    "</div>";
  }).join("") + "</div>";
  c.querySelectorAll("[data-auto]").forEach(btn=>{
    btn.addEventListener("click", ()=> startAutomatisme(AUTOMATISMES.find(a=>a.id===btn.dataset.auto)));
  });
}
function startAutomatisme(cat){
  let idx = 0, correctCount = 0;
  const total = 8;
  render();
  function render(){
    const c = document.getElementById("tabContent");
    const q = cat.generate();
    c.innerHTML = "<div class='session'>"+
      "<div class='progresstop'><div class='track'><span style='width:"+Math.round(idx/total*100)+"%'></span></div><div class='count mono'>"+(idx+1)+"/"+total+"</div></div>"+
      "<div class='q-prompt'>"+q.q+"</div>"+
      "<div id='autoBody'></div>"+
      "<div id='autoFeedback'></div>"+
      "<div class='rowbtns'><button class='btn ghost small' id='quitAuto'>Quitter</button></div>"+
    "</div>";
    document.getElementById("quitAuto").addEventListener("click", renderTab);
    const body = document.getElementById("autoBody");
    if(q.choices){
      body.innerHTML = "<div class='choices'>"+q.choices.map(ch=>"<button class='choice' data-c='"+ch+"'>"+ch+"</button>").join("")+"</div>";
      body.querySelectorAll(".choice").forEach(b=> b.addEventListener("click", ()=>check(b.dataset.c===q.a, b, q)));
    } else {
      body.innerHTML = "<input type='text' class='fillbox' id='autoInput' placeholder='Ta réponse...'><div class='rowbtns'><button class='btn amber' id='autoCheck'>Valider</button></div>";
      document.getElementById("autoCheck").addEventListener("click", ()=>{
        const val = document.getElementById("autoInput").value.trim().replace(",",".");
        const correct = parseFloat(val)===parseFloat(q.a.replace(",","."));
        check(correct, null, q);
      });
    }
  }
  function check(correct, btn, q){
    if(correct) correctCount++;
    state._autoCount = (state._autoCount||0)+1;
    state.xp += correct?3:1;
    const newBadges = checkBadges();
    document.getElementById("autoFeedback").innerHTML = "<div class='feedback "+(correct?'ok':'ko')+"'><b>"+(correct?"✅ Correct !":"➡️ Pas tout à fait.")+"</b>Réponse : "+q.a+
      (newBadges.length?"<div class='badgegrid'>"+newBadges.map(b=>"<div class='badge'>"+b.emoji+"<span>"+b.name+"</span></div>").join("")+"</div>":"")+
      "<div class='rowbtns' style='margin-top:10px;'><button class='btn teal small' id='nextAuto'>"+(idx+1<total?"Suivant →":"Terminer")+"</button></div></div>";
    save(); refreshHeader();
    document.getElementById("nextAuto").addEventListener("click", ()=>{
      idx++;
      if(idx>=total){
        if(!state.automatismesStats[cat.id] || state.automatismesStats[cat.id].best<correctCount){
          state.automatismesStats[cat.id] = {best:correctCount};
        }
        save();
        const c = document.getElementById("tabContent");
        c.innerHTML = "<div class='session' style='text-align:center;'><h2>Résultat : "+correctCount+"/"+total+"</h2><p style='color:var(--ink-soft);'>Bravo pour cet entraînement, la régularité compte plus que la vitesse.</p><div class='rowbtns' style='justify-content:center;'><button class='btn amber' id='backAuto'>Retour</button></div></div>";
        document.getElementById("backAuto").addEventListener("click", renderTab);
      } else render();
    });
  }
}

/* ---------- dashboard tab ---------- */
function renderDashboard(c){
  const domains = [];
  NOTIONS.forEach(n=>{ if(domains.indexOf(n.domain)===-1) domains.push(n.domain); });
  let domainRows = domains.map(d=>{
    const ns = NOTIONS.filter(n=>n.domain===d);
    const totalPct = Math.round(ns.reduce((s,n)=>s+notionOverallPct(n),0)/ns.length);
    return "<tr><td>"+d+"</td><td>"+totalPct+"%</td></tr>";
  }).join("");
  const fragiles = NOTIONS.filter(n=>{ const s=notionStatus(n); return s.cls==="fragile"||s.cls==="revoir"; });
  const maitrisees = NOTIONS.filter(n=> notionOverallPct(n)===100);
  const errCounts = {};
  state.errorLog.forEach(e=>{ errCounts[e.errorType]=(errCounts[e.errorType]||0)+1; });
  const topErrors = Object.entries(errCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const nextNotion = NOTIONS.find(n=> notionUnlocked(n) && notionOverallPct(n)<100);

  c.innerHTML = "<div class='card' style='margin-bottom:14px;'>"+
    "<h3>📊 Progression par domaine</h3>"+
    "<table class='datatable'><thead><tr><th>Domaine</th><th>Progression</th></tr></thead><tbody>"+domainRows+"</tbody></table>"+
  "</div>"+
  "<div class='grid' style='margin-bottom:14px;'>"+
    "<div class='card'><h3>🌱 Notions fragiles</h3><p>"+(fragiles.length? fragiles.map(n=>n.name).join(", ") : "Aucune pour l'instant.")+"</p></div>"+
    "<div class='card'><h3>🏆 Notions maîtrisées</h3><p>"+(maitrisees.length? maitrisees.map(n=>n.name).join(", ") : "Aucune pour l'instant.")+"</p></div>"+
  "</div>"+
  "<div class='card' style='margin-bottom:14px;'>"+
    "<h3>🔎 Erreurs fréquentes</h3>"+
    (topErrors.length? ("<table class='datatable'><thead><tr><th>Type d'erreur</th><th>Occurrences</th></tr></thead><tbody>"+topErrors.map(function(e){return "<tr><td>"+e[0]+"</td><td>"+e[1]+"</td></tr>";}).join("")+"</tbody></table>") : "<p>Aucune erreur enregistrée pour l'instant.</p>")+
  "</div>"+
  "<div class='card'>"+
    "<h3>👉 Recommandation pour la prochaine séance</h3>"+
    "<p>"+(nextNotion? ("Continuer sur : <b>"+nextNotion.emoji+" "+nextNotion.name+"</b> ("+nextNotion.domain+")") : "Toutes les notions débloquées sont en cours de maîtrise, bravo !")+"</p>"+
  "</div>";
}

/* ---------- review tab ---------- */
function renderErreursTab(c){
  const pool = reviewPool();
  if(!pool.length){
    c.innerHTML = "<div class='empty'>Aucune erreur enregistrée pour l'instant — continue comme ça ! 🌟</div>";
    return;
  }
  c.innerHTML = "<div class='card'>"+
    "<h3>🔁 Revoir mes erreurs</h3>"+
    "<p>"+pool.length+" exercice(s) à retravailler, choisis parmi tes erreurs récentes.</p>"+
    "<button class='btn coral' id='startReview'>Démarrer la révision</button>"+
  "</div>";
  document.getElementById("startReview").addEventListener("click", ()=> startSession(pool, {type:"review"}));
}

/* ---------- badges tab ---------- */
function renderBadgesTab(c){
  c.innerHTML = "<div class='card'>"+
    "<h3>🏅 Mes badges</h3>"+
    "<div class='badgegrid'>"+
      BADGE_DEFS.map(b=>{
        const unlocked = state.badges.includes(b.id);
        return "<div class='badge "+(unlocked?'':'locked')+"'>"+b.emoji+"<span>"+b.name+"</span></div>";
      }).join("")+
    "</div>"+
  "</div>";
}

/* ============================================================
   MODE PARENT
   ============================================================ */
document.getElementById("parentGear").addEventListener("click", ()=> openParentPanel());
function openParentPanel(){
  let rows = "";
  NOTIONS.forEach(n=>{
    const p = getProgress(n.id);
    [1,2,3,4].forEach(l=>{
      rows += "<tr><td>"+n.name+"</td><td>Niv. "+l+"</td><td>"+p[l].attempts+"</td><td>"+p[l].correct+"</td><td>"+(p[l].validated?"✓":"—")+"</td></tr>";
    });
  });
  let errRows = state.errorLog.slice(-15).reverse().map(e=>{
    const n = NOTIONS.find(x=>x.id===e.notion);
    return "<tr><td>"+(n?n.name:e.notion)+"</td><td>Niv. "+e.level+"</td><td>"+e.errorType+"</td><td>"+new Date(e.ts).toLocaleString("fr-FR")+"</td></tr>";
  }).join("");
  let flagRows = state.flaggedQuestions.slice(-15).reverse().map(f=>{
    const n = NOTIONS.find(x=>x.id===f.notion);
    return "<tr><td>"+(n?n.name:f.notion)+"</td><td>"+f.reason+"</td><td>"+(f.prompt||"").slice(0,50)+(f.comment?" — "+f.comment:"")+"</td></tr>";
  }).join("");

  overlayRoot.innerHTML = "<div class='overlay'><div class='modal'>"+
    "<button class='close' id='closeParent'>✕</button>"+
    "<h2>⚙ Mode parent</h2>"+
    "<p style='color:var(--ink-soft); font-size:0.85rem;'>Cet espace permet de vérifier, débloquer et suivre la progression de Louise.</p>"+
    "<label class='small'>Accès rapide</label>"+
    "<div class='rowbtns'>"+
      "<button class='btn ghost small' id='toggleUnlock'>"+(state.parentUnlockAll?"Verrouiller à nouveau tout":"Débloquer toutes les notions/niveaux")+"</button>"+
      "<button class='btn coral small' id='resetProgress'>Réinitialiser toute la progression</button>"+
    "</div>"+
    "<label class='small'>Aller directement à un niveau</label>"+
    "<div class='rowbtns'>"+
      "<select id='jumpNotion'>"+NOTIONS.map(n=>"<option value='"+n.id+"'>"+n.name+"</option>").join("")+"</select>"+
      "<select id='jumpLevel'><option value='1'>Niveau 1</option><option value='2'>Niveau 2</option><option value='3'>Niveau 3</option><option value='4'>Niveau 4</option></select>"+
      "<button class='btn amber small' id='jumpGo'>Ouvrir</button>"+
    "</div>"+
    "<label class='small'>Statistiques par notion</label>"+
    "<div style='max-height:160px; overflow:auto; border:1px solid var(--line); border-radius:10px; padding:4px;'>"+
      "<table class='datatable'><thead><tr><th>Notion</th><th>Niv.</th><th>Essais</th><th>Réussites</th><th>Validé</th></tr></thead><tbody>"+rows+"</tbody></table>"+
    "</div>"+
    "<label class='small'>Dernières erreurs (avec type d'erreur)</label>"+
    "<div style='max-height:130px; overflow:auto; border:1px solid var(--line); border-radius:10px; padding:4px;'>"+
      "<table class='datatable'><thead><tr><th>Notion</th><th>Niv.</th><th>Type</th><th>Date</th></tr></thead><tbody>"+(errRows||"<tr><td colspan='4'>Aucune erreur enregistrée.</td></tr>")+"</tbody></table>"+
    "</div>"+
    "<label class='small'>Questions signalées par Louise</label>"+
    "<div style='max-height:130px; overflow:auto; border:1px solid var(--line); border-radius:10px; padding:4px;'>"+
      "<table class='datatable'><thead><tr><th>Notion</th><th>Motif</th><th>Question / commentaire</th></tr></thead><tbody>"+(flagRows||"<tr><td colspan='3'>Aucun signalement.</td></tr>")+"</tbody></table>"+
    "</div>"+
    "<label class='small'>Avant de rendre l'ordinateur à Louise</label>"+
    "<div class='rowbtns'>"+
      "<button class='btn ghost small' id='hideGear'>Masquer ce menu (raccourci : Ctrl+Maj+P pour le rouvrir)</button>"+
    "</div>"+
  "</div></div>";
  document.getElementById("closeParent").addEventListener("click", closeOverlay);
  document.getElementById("toggleUnlock").addEventListener("click", ()=>{ state.parentUnlockAll = !state.parentUnlockAll; save(); openParentPanel(); });
  document.getElementById("resetProgress").addEventListener("click", ()=>{
    if(confirm("Réinitialiser toute la progression, les XP et les badges de Louise ?")){
      const keepHide = state.hideParentGear;
      state = defaultState(); state.hideParentGear = keepHide;
      save(); refreshHeader(); closeOverlay(); renderApp();
    }
  });
  document.getElementById("jumpGo").addEventListener("click", ()=>{
    const n = NOTIONS.find(x=>x.id===document.getElementById("jumpNotion").value);
    const lvl = parseInt(document.getElementById("jumpLevel").value);
    closeOverlay();
    startSession(n.levels[lvl].map(x=>x), {type:"notion", notionId:n.id, level:lvl});
  });
  document.getElementById("hideGear").addEventListener("click", ()=>{
    state.hideParentGear = true; save();
    document.getElementById("parentGear").style.display = "none";
    closeOverlay(); toast("Menu masqué. Ctrl+Maj+P pour le rouvrir.");
  });
}
if(state.hideParentGear) document.getElementById("parentGear").style.display = "none";
document.addEventListener("keydown", (e)=>{
  if(e.ctrlKey && e.shiftKey && (e.key==="P"||e.key==="p")){
    state.hideParentGear = false; save();
    document.getElementById("parentGear").style.display = "inline";
    openParentPanel();
  }
});

/* ============================================================
   INIT
   ============================================================ */
renderApp();
</script>
